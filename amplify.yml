version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            cd frontend/admin && npm ci
          else
            cd frontend/user && npm ci
          fi
    build:
      commands:
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            cd frontend/admin && npm run build
          else
            cd frontend/user && npm run build
          fi
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            cp -r frontend/admin/.next .next
          else
            cp -r frontend/user/.next .next
          fi
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/user/node_modules/**/*
      - frontend/admin/node_modules/**/*
      - .next/cache/**/*
