version: 1
frontend:
  phases:
    preBuild:
      commands:
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            npm ci --prefix frontend/admin
          else
            npm ci --prefix frontend/user
          fi
    build:
      commands:
        - |
          if [ "$AWS_BRANCH" = "admin" ]; then
            npm run build --prefix frontend/admin
            cp -r frontend/admin/.next .next
          else
            npm run build --prefix frontend/user
            cp -r frontend/user/.next .next
          fi
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - frontend/user/node_modules/**/*
      - frontend/admin/node_modules/**/*
      - .next/cache/**/*
